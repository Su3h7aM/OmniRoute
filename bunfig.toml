[install]
# Prefer Bun-only installs for the monorepo migration.
# Use hoisted linker for broader Next.js/tooling compatibility during migration.
linker = "hoisted"

[test]
root = "."
preload = ["./tests/setup/runtime.ts", "./tests/setup/jsdom.ts"]
pathIgnorePatterns = [
	"tests/unit/cli-runtime-*.test.*",
	"tests/unit/cliproxyapi-executor.test.*",
	"tests/unit/cli-memory.test.*",
	"tests/unit/cli-tools.test.*",
	"tests/unit/qoder-cli.test.*",
	"tests/unit/t40-opencode-cli-tools-integration.test.*",
	"tests/unit/claude-cli-defaults.test.*",
]
